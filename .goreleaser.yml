version: 2

builds:
  - main: ./cmd/clanchor
    binary: clanchor
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: valon-loshaj
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/valon-loshaj/clanchor
    description: Version and distribute your CLAUDE.md files
    license: MIT

release:
  github:
    owner: valon-loshaj
    name: clanchor
